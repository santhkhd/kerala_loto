<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Official PDFs - Kerala Lottery</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .pdf-list {
            padding: 16px;
        }

        .pdf-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
        }

        .pdf-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .pdf-title {
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .pdf-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .pdf-actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .btn-view {
            background: var(--primary-light);
            color: var(--primary);
            border: 1px solid transparent;
        }

        .btn-download {
            background: #ef4444;
            color: white;
        }

        .btn-share {
            background: #25D366;
            color: white;
        }

        body.dark .pdf-card {
            background: #1f2937;
            border-color: #374151;
        }

        body.dark .btn-view {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="title-group">
                <h1>Official PDFs</h1>
            </div>
            <button class="theme-toggle" id="theme-toggle">
                <i class="material-icons">dark_mode</i>
            </button>
            <a href="live.html" class="live-header-btn">Live</a>
            <button class="lang-toggle" id="lang-toggle">
                <i class="material-icons">translate</i>
            </button>
        </header>

        <div class="pdf-list" id="pdf-container">
            <!-- Dynamic Content -->
            <div class="skeleton" style="height: 80px; border-radius: 16px;"></div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="material-icons">home</i>
                <span>Results</span>
            </a>
            <a href="prediction.html" class="nav-item">
                <i class="material-icons">star</i>
                <span>Lucky</span>
            </a>
            <a href="search.html" class="nav-item">
                <i class="material-icons">search</i>
                <span>Search</span>
            </a>
            <a href="downloads.html" class="nav-item active">
                <i class="material-icons">picture_as_pdf</i>
                <span>Download</span>
            </a>
        </nav>

        <!-- Language Modal -->
        <div class="lang-modal-overlay" id="lang-modal-overlay">
            <div class="lang-modal">
                <h3>Select Language</h3>
                <div class="lang-options">
                    <div class="lang-option" data-lang="en">
                        <span>English</span>
                        <i class="material-icons">check_circle</i>
                    </div>
                    <div class="lang-option" data-lang="ml">
                        <span>മലയാളം</span>
                        <i class="material-icons">check_circle</i>
                    </div>
                    <div class="lang-option" data-lang="ta">
                        <span>தமிழ்</span>
                        <i class="material-icons">check_circle</i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('pdf-container');

            try {
                // Fetch the manual data file
                const res = await fetch('pdf_data.json');
                const data = await res.json();

                container.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'pdf-card fade-in';

                    // Create download button with specific filename fragment for Android app handling
                    const fileName = `${item.lottery.replace(/\s+/g, '_')}-${item.draw_no}.pdf`;
                    const downloadHref = `${item.url}#filename=${fileName}`;

                    // Format the share message
                    const appLink = "https://play.google.com/store/apps/details?id=com.kerala.lottery.results.today.sanshiv";
                    const shareText = `📢 Kerala Lottery Result Published! \n\n🏆 ${item.lottery} (${item.draw_no})\n\n📲 Check full result & Download PDF in our Official App:\n${appLink}`;
                    const shareUrl = `shareapp://?message=${encodeURIComponent(shareText)}&url=${item.url}`;

                    card.innerHTML = `
                        <div class="pdf-info">
                            <div class="pdf-title">${item.lottery}</div>
                            <div class="pdf-meta">Draw: ${item.draw_no} • ${item.date}</div>
                        </div>
                        <div class="pdf-actions">
                            <a href="${item.url}#target=external" class="action-btn btn-view" target="_blank" rel="noopener noreferrer">
                                <i class="material-icons" style="font-size:1.1rem">visibility</i> View
                            </a>
                            <a href="${downloadHref}" class="action-btn btn-download">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                Download
                            </a>
                            <a href="${shareUrl}" class="action-btn btn-share">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="white" stroke="currentColor" stroke-width="0" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                                </svg>
                            </a>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="empty-state"><p>Failed to load downloads.</p></div>';
            }
        });
    </script>
</body>

</html>
